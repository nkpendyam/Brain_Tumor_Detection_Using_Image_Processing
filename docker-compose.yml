services:
  btd-ai:
    build: .
    image: btd-brain-tumor-ai:latest
    container_name: btd_production
    restart: unless-stopped

    ports:
      - "7860:7860"

    volumes:
      # Persist models, datasets, and reports to your local machine
      - ./dataset_ensemble:/app/dataset_ensemble
      - ./dataset_volumetric:/app/dataset_volumetric
      - ./dataset_negatives:/app/dataset_negatives
      - ./dataset_faces:/app/dataset_faces
      - ./runs:/app/runs
      # Mount trained model weights
      - ./Gatekeeper_Clinical.pth:/app/Gatekeeper_Clinical.pth
      - ./Gatekeeper_v1.pth:/app/Gatekeeper_v1.pth
      - ./Swin_5C.pth:/app/Swin_5C.pth
      - ./ConvNext_5C.pth:/app/ConvNext_5C.pth
      - ./MONAI_5C.pth:/app/MONAI_5C.pth
      # Kaggle API credentials (read-only)
      - ~/.kaggle:/root/.kaggle:ro

    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - BTD_SERVER_NAME=0.0.0.0
      - BTD_SHARE=0
      - CUDA_VISIBLE_DEVICES=0
      - TF_ENABLE_ONEDNN_OPTS=0

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    stdin_open: true
    tty: true
