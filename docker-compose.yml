version: '3.8'

services:
  hydra-ai:
    build: .
    container_name: hydra_production
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      # Mount current directory to /app so Reports/Models are saved to your laptop
      - .:/app
      # Optional: Avoid overwriting container system files with host junk
      - /app/__pycache__
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true # Equivalent to -i
    tty: true        # Equivalent to -t